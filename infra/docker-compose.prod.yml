# ─── Producción VPS 77.93.154.87 / Dokploy ───
# Uso: docker compose -f docker-compose.prod.yml up -d

networks:
  app:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    networks:
      - app
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app
    volumes:
      - redis_prod:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openwa:
    image: ghcr.io/rmyndharis/openwa:latest
    restart: always
    networks:
      - app
    ports:
      - "2785:2785"
    volumes:
      - openwa_prod:/home/openwa/.openwa
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      SESSION_DIR: /home/openwa/.openwa/sessions
      HOOK_INTERVAL: "1000"
      SERVER_PORT: "2785"
      PUID: "1000"
      PGID: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2785/api/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend-api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    ports:
      - "3001:3000"
    volumes:
      - uploads_prod:/app/uploads
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENWA_BASE_URL: http://openwa:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET}
      UPLOADS_DIR: /app/uploads
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openwa:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  bot-worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.worker
    restart: always
    networks:
      - app
    volumes:
      - uploads_prod:/app/uploads
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENWA_BASE_URL: http://openwa:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET}
      UPLOADS_DIR: /app/uploads
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openwa:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    ports:
      - "80:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://77.93.154.87:3001/api
      NEXT_PUBLIC_APP_URL: http://77.93.154.87
    depends_on:
      - backend-api

volumes:
  postgres_prod:
  redis_prod:
  openwa_prod:
  uploads_prod: