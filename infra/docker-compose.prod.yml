# ─── Producción VPS 77.93.154.87 / Dokploy ───
# Uso: docker compose -f docker-compose.prod.yml up -d

networks:
  app:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    networks:
      - app
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zentp4ssw0rd!}
      POSTGRES_DB: ${POSTGRES_DB:-zent}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zent -d zent"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app
    volumes:
      - redis_prod:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openwa:
    image: ghcr.io/rmyndharis/openwa:latest
    restart: always
    networks:
      - app
    ports:
      - "2785:2785"
    volumes:
      - openwa_prod:/home/openwa/.openwa
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-zent}:${POSTGRES_PASSWORD:-zentp4ssw0rd!}@postgres:5432/${POSTGRES_DB:-zent}
      REDIS_URL: redis://redis:6379
      SESSION_DIR: /home/openwa/.openwa/sessions
      HOOK_INTERVAL: "1000"
      SERVER_PORT: "2785"
      PUID: "1000"
      PGID: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2785/api/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend-api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    ports:
      - "3001:3000"
    volumes:
      - uploads_prod:/app/uploads
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-zent}:${POSTGRES_PASSWORD:-zentp4ssw0rd!}@postgres:5432/${POSTGRES_DB:-zent}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENWA_BASE_URL: http://openwa:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET}
      UPLOADS_DIR: /app/uploads
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openwa:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  bot-worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.worker
    restart: always
    networks:
      - app
    volumes:
      - uploads_prod:/app/uploads
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-zent}:${POSTGRES_PASSWORD:-zentp4ssw0rd!}@postgres:5432/${POSTGRES_DB:-zent}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENWA_BASE_URL: http://openwa:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET}
      UPLOADS_DIR: /app/uploads
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openwa:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    ports:
      - "8080:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-http.rule=Host(`77.93.154.87`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.service=frontend-svc"
      - "traefik.http.routers.frontend-https.rule=Host(`77.93.154.87`)"
      - "traefik.http.routers.frontend-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-https.tls=true"
      - "traefik.http.routers.frontend-https.service=frontend-svc"
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
    environment:
      NEXT_PUBLIC_API_URL: http://77.93.154.87:3001/api
      NEXT_PUBLIC_APP_URL: http://77.93.154.87:8080
    depends_on:
      - backend-api

  traefik:
    image: traefik:v3.2
    restart: always
    networks:
      - app
    ports:
      - "8443:443"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=infra_app"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--api.insecure=true"
      - "--log.level=INFO"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_prod:
  redis_prod:
  openwa_prod:
  uploads_prod: