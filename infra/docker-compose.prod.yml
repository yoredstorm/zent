# ─── Producción VPS / Dokploy ───
# Dokploy genera .env en el servidor desde Environment (no viene de git).
# Uso: docker compose -f docker-compose.prod.yml up -d

networks:
  app:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    networks:
      - app
    env_file:
      - .env
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-inventario}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app
    volumes:
      - redis_prod:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openwa:
    image: ghcr.io/rmyndharis/openwa:latest
    restart: always
    networks:
      - app
    shm_size: "1gb"
    env_file:
      - .env
    volumes:
      - openwa_prod:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "2785"
      # Fuerza la misma clave que backend-api (evita API_MASTER_KEY obsoleto en .env).
      API_MASTER_KEY: ${OPENWA_API_KEY:?OPENWA_API_KEY is required}
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      REDIS_BUILTIN: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QUEUE_ENABLED: "true"
      # Permite webhook a backend-api (IP Docker 172.x); sin esto OpenWA rechaza la URL por SSRF
      SSRF_ALLOWED_HOSTS: backend-api
      SESSION_DATA_PATH: /app/data/sessions
      PUPPETEER_HEADLESS: "true"
      PUPPETEER_ARGS: "--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:2785/api/health/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 120s

  openwa-ssl:
    build:
      context: ./openwa-proxy
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    ports:
      - "2785:80"
      - "2786:443"
    depends_on:
      openwa:
        condition: service_started

  backend-api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - uploads_prod:/app/uploads
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in Dokploy Environment}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in Dokploy Environment}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FORCE_RESET: ${ADMIN_FORCE_RESET:-false}
      SETUP_FORCE_RESET: ${SETUP_FORCE_RESET:-false}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENWA_BASE_URL: http://openwa:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY:?OPENWA_API_KEY is required}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET:-webhook-secret-2024}
      OPENWA_WEBHOOK_URL: http://backend-api:3000/api/webhooks/openwa
      BOT_PLUGIN_SECRET: ${BOT_PLUGIN_SECRET:-${OPENWA_WEBHOOK_SECRET:-webhook-secret-2024}}
      ZENT_FLOW_PLUGIN_ENABLED: ${ZENT_FLOW_PLUGIN_ENABLED:-true}
      UPLOADS_DIR: /app/uploads
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://77.93.154.87:3001/api}
      STORE_NAME: ${STORE_NAME:-Zent}
      VENDOR_NOTIFY_PHONES: ${VENDOR_NOTIFY_PHONES:-}
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  bot-worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.worker
    restart: always
    networks:
      - app
    env_file:
      - .env
    volumes:
      - uploads_prod:/app/uploads
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in Dokploy Environment}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENWA_BASE_URL: http://openwa:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY:?OPENWA_API_KEY is required}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET:-webhook-secret-2024}
      OPENWA_WEBHOOK_URL: http://backend-api:3000/api/webhooks/openwa
      BOT_PLUGIN_SECRET: ${BOT_PLUGIN_SECRET:-${OPENWA_WEBHOOK_SECRET:-webhook-secret-2024}}
      ZENT_FLOW_PLUGIN_ENABLED: ${ZENT_FLOW_PLUGIN_ENABLED:-true}
      UPLOADS_DIR: /app/uploads
      STORE_NAME: ${STORE_NAME:-Zent}
      VENDOR_NOTIFY_PHONES: ${VENDOR_NOTIFY_PHONES:-}
      CART_HOLD_TTL_MINUTES: ${CART_HOLD_TTL_MINUTES:-30}
      CART_HOLD_WARN_MINUTES: ${CART_HOLD_WARN_MINUTES:-5}
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    ports:
      - "8080:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-http.rule=Host(`77.93.154.87`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.service=frontend-svc"
      - "traefik.http.routers.frontend-https.rule=Host(`77.93.154.87`)"
      - "traefik.http.routers.frontend-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-https.tls=true"
      - "traefik.http.routers.frontend-https.service=frontend-svc"
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
    environment:
      NEXT_PUBLIC_API_URL: http://77.93.154.87:3001/api
      NEXT_PUBLIC_APP_URL: http://77.93.154.87:8080
      INTERNAL_API_URL: http://backend-api:3000/api
    depends_on:
      - backend-api

  loki:
    image: grafana/loki:3.0.0
    restart: always
    networks:
      - app
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    restart: always
    networks:
      - app
    environment:
      DOCKER_API_VERSION: "1.44"
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: always
    networks:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    networks:
      - app
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  grafana:
    build:
      context: ./monitoring/grafana
      dockerfile: Dockerfile
    restart: always
    networks:
      - app
    env_file:
      - .env
    ports:
      - "3002:3000"
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus

  traefik:
    # v3.6.1+ negocia la API de Docker automaticamente (Docker 29+ exige min 1.44; v3.2 usa 1.24)
    image: traefik:v3.6.6
    restart: always
    networks:
      - app
    ports:
      - "8443:443"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=infra_app"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--api.insecure=true"
      - "--log.level=INFO"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  # Sin name: fijo — cada proyecto Dokploy (COMPOSE_PROJECT_NAME) tiene sus propios
  # volúmenes. Evita que un "proyecto nuevo" reutilice la DB de otro despliegue.
  postgres_prod:
  redis_prod:
  openwa_prod:
  uploads_prod:
  loki_data:
  prometheus_data:
  grafana_data:
