name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            directory: apps/api
          - app: dashboard
            directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.directory }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.directory }}
        run: npm run lint

      - name: Build
        working-directory: ${{ matrix.directory }}
        run: npm run build

      - name: Prisma generate (api only)
        if: matrix.app == 'api'
        working-directory: apps/api
        run: npx prisma generate

  integration-e2e:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Start CI stack
        working-directory: infra
        run: docker compose -p zent-ci -f docker-compose.ci.yml up -d --build --wait

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run setup E2E
        env:
          CI: "true"
        run: node scripts/validate-setup-e2e.mjs http://localhost:3001/api

      - name: Teardown
        if: always()
        working-directory: infra
        run: docker compose -p zent-ci -f docker-compose.ci.yml down -v

  deploy-dokploy:
    runs-on: ubuntu-latest
    needs: integration-e2e
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    steps:
      - name: Trigger Dokploy Compose deploy
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DOKPLOY_DEPLOY_WEBHOOK_URL not set — skip deploy"
            exit 0
          fi
          payload=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg msg "${{ github.event.head_commit.message }}" \
            '{
              ref: $ref,
              repository: { full_name: $repo },
              head_commit: { id: $sha, message: ($msg // "Deploy from GitHub Actions") },
              commits: [{ modified: ["infra/docker-compose.prod.yml", "apps/api", "apps/dashboard"] }]
            }')
          echo "Triggering Dokploy deploy for ${{ github.ref }} (${{ github.sha }})"
          response=$(curl -sS -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$payload")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n 1)
          echo "Dokploy response ($code): $body"
          if [ "$code" != "200" ]; then
            echo "::error::Dokploy webhook HTTP $code — $body"
            echo "Check Dokploy Compose: Auto Deploy ON, branch matches ${{ github.ref_name }}, watch paths include infra/ or are empty."
            exit 1
          fi
